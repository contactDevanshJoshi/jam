<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydration Tracker</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Quicksand&display=swap" rel="stylesheet">

<style>
body { font-family: 'Quicksand', sans-serif; }
.glass { background: rgba(255,255,255,0.25); backdrop-filter: blur(20px); }
.btn-glow { background: linear-gradient(135deg,#a8d8ff,#c4b5fd,#fbb6ce); }
.progress-fill { background: linear-gradient(90deg,#a8d8ff,#c4b5fd,#fbb6ce); }
.title-font { font-family: 'Dancing Script', cursive; }
</style>
</head>

<body class="h-full">

<div class="h-full flex justify-center items-center" style="background:linear-gradient(160deg,#c5dff8,#f5d0de);">

<div class="w-full max-w-[420px] p-5">

<h1 class="title-font text-3xl text-center mb-4">💧 Hydration Tracker for Jaimi</h1>

<p class="text-center text-4xl mb-3">
<span id="current-count">0</span> / <span id="goal-display">12</span>
</p>

<div class="bg-white rounded-full h-3 mb-4">
<div id="progress-bar" class="h-3 rounded-full progress-fill" style="width:0%"></div>
</div>

<button onclick="addGlass()" class="btn-glow w-full py-3 rounded-xl text-white mb-2">
+1 Glass 💧
</button>

<button onclick="undoGlass()" class="glass w-full py-2 rounded-xl">
Undo
</button>

<div class="glass rounded-xl p-4 text-center mt-4">
<p style="font-size:12px;">Current Streak</p>
<p id="streak-count">🔥 0 days</p>
</div>

</div>
</div>

<!-- 🔔 POPUP -->
<div id="popup" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:white;padding:15px 25px;border-radius:20px;display:none;
box-shadow:0 10px 30px rgba(0,0,0,0.2);z-index:999;">
<span id="popup-text"></span>
</div>

<!-- 🔥 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdPWpNEMvjVrrGgn4MNeuq8X-QpyuSon0",
  authDomain: "water-3a73e.firebaseapp.com",
  projectId: "water-3a73e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// make global
window.db = db;
window.setDoc = setDoc;
window.getDoc = getDoc;
window.doc = doc;
window.collection = collection;
window.getDocs = getDocs;
window.onSnapshot = onSnapshot;

window.dispatchEvent(new Event("firebase-ready"));
</script>

<!-- MAIN SCRIPT -->
<script>
let count = 0;
let goal = 12; // default fallback
let lastTrigger = 0;

// UI
function updateUI() {
  document.getElementById("current-count").innerText = count;
  document.getElementById("goal-display").innerText = goal;
  document.getElementById("progress-bar").style.width = (count/goal*100) + "%";
}

// SAVE
async function saveData() {
  const today = new Date().toISOString().split("T")[0];

  await window.setDoc(window.doc(window.db, "hydration", today), {
    date: today,
    glasses: count,
    completed: count >= goal
  });
}

// LOAD
async function loadData() {
  const today = new Date().toISOString().split("T")[0];

  const snap = await window.getDoc(window.doc(window.db, "hydration", today));

  if (snap.exists()) {
    count = snap.data().glasses || 0;
    updateUI();
  }
}

// ✅ GLOBAL FUNCTIONS (FIXED)
window.addGlass = async function () {
  if (count < goal) {
    count++;
    updateUI();
    await saveData();

    if (count === goal) {
      showPopup(window.surpriseText || "🎁 Done 💙");
    }
  }
};

window.undoGlass = function () {
  if (count > 0) {
    count--;
    updateUI();
    saveData();
  }
};

// STREAK
async function calculateStreak() {
  const snapshot = await window.getDocs(window.collection(window.db, "hydration"));

  let dates = [];
  snapshot.forEach(doc => {
    if (doc.data().completed) dates.push(doc.data().date);
  });

  dates.sort().reverse();

  let streak = 0;
  let today = new Date();

  for (let i = 0; i < dates.length; i++) {
    let d = new Date(dates[i]);
    let diff = Math.floor((today - d) / (1000*60*60*24));

    if (diff === streak) streak++;
    else break;
  }

  document.getElementById("streak-count").innerText = `🔥 ${streak} days`;
}

// 🔥 REAL-TIME SETTINGS (DYNAMIC GOAL FIXED)
function listenSettings() {
  const ref = window.doc(window.db, "settings", "main");

  window.onSnapshot(ref, (snap) => {
    if (!snap.exists()) return;

    const data = snap.data();

    // ✅ dynamic goal (correct way)
    if (data.goal !== undefined) {
      goal = data.goal;

      // prevent overflow
      if (count > goal) count = goal;
    }

    if (data.surprise) window.surpriseText = data.surprise;

    // live message trigger
    if (data.trigger && data.trigger !== lastTrigger) {
      lastTrigger = data.trigger;

      if (data.message) {
        showPopup(data.message);
      }
    }

    updateUI();
  });
}

// POPUP
function showPopup(text) {
  const popup = document.getElementById("popup");
  const txt = document.getElementById("popup-text");

  txt.innerText = text;
  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 3000);
}

// INIT
window.addEventListener("firebase-ready", () => {
  loadData();
  calculateStreak();
  listenSettings();
});

updateUI();
</script>

</body>
</html>
