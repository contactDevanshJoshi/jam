<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Quicksand&display=swap" rel="stylesheet">

<style>
body { font-family: 'Quicksand', sans-serif; }
.glass { background: rgba(255,255,255,0.25); backdrop-filter: blur(20px); }
.btn-glow { background: linear-gradient(135deg,#a8d8ff,#c4b5fd,#fbb6ce); }
.title-font { font-family: 'Dancing Script', cursive; }
</style>
</head>

<body class="h-full">

<div class="h-full flex justify-center items-center" style="background:linear-gradient(160deg,#c5dff8,#f5d0de);">

<div class="w-full max-w-[420px] p-5">

<!-- 🔐 LOGIN -->
<div id="login-box">
<h1 class="title-font text-3xl text-center mb-4">🔐 Admin Access</h1>

<input id="password" type="password" placeholder="Enter password"
class="w-full p-3 rounded-xl mb-3">

<button onclick="login()" class="btn-glow w-full py-3 rounded-xl text-white">
Login
</button>

<p id="error" class="text-red-500 text-center mt-2"></p>
</div>

<!-- ⚙️ PANEL -->
<div id="panel" style="display:none;">

<h1 class="title-font text-3xl text-center mb-4">⚙️ Control Panel</h1>

<div class="glass rounded-xl p-4 mb-3">
<label>Daily Goal</label>
<input id="goal" type="number" class="w-full p-2 rounded mt-1">
</div>

<div class="glass rounded-xl p-4 mb-3">
<label>Send Message 💬</label>
<textarea id="message" class="w-full p-2 rounded mt-1"></textarea>
</div>

<div class="glass rounded-xl p-4 mb-3">
<label>Surprise Message 🎁</label>
<textarea id="surprise" class="w-full p-2 rounded mt-1"></textarea>
</div>

<!-- 🔔 NOTIFICATION SECTION -->
<div class="glass rounded-xl p-4 mb-3">
<label class="block mb-2">🔔 Send Notification</label>

<div class="grid grid-cols-2 gap-2">
<button onclick="sendPreset('morning')" class="btn-glow py-2 rounded-xl text-white">🌅 Morning</button>
<button onclick="sendPreset('afternoon')" class="btn-glow py-2 rounded-xl text-white">☀️ Afternoon</button>
<button onclick="sendPreset('evening')" class="btn-glow py-2 rounded-xl text-white">🌇 Evening</button>
<button onclick="sendPreset('night')" class="btn-glow py-2 rounded-xl text-white">🌙 Night</button>
</div>

<button onclick="sendCustomNotification()" class="glass w-full py-2 rounded-xl mt-3">
✍️ Send Custom Message
</button>
</div>

<button onclick="send()" class="btn-glow w-full py-3 rounded-xl text-white mb-3">
Send / Update 🚀
</button>

<button onclick="logout()" class="glass w-full py-2 rounded-xl">
Logout
</button>

<div class="glass rounded-xl p-4 mt-4">
<p class="text-center mb-2">📊 Last 7 Days</p>
<canvas id="chart"></canvas>
</div>

</div>

</div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdPWpNEMvjVrrGgn4MNeuq8X-QpyuSon0",
  authDomain: "water-3a73e.firebaseapp.com",
  projectId: "water-3a73e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔔 YOUR WORKER URL
const WORKER_URL = "https://notification.contact-devanshjoshi.workers.dev";

// 🔔 SEND NOTIFICATION
async function sendNotification(title, message) {
  await fetch(WORKER_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title, message })
  });
}

// 🔥 PRESET NOTIFICATIONS
window.sendPreset = function(type) {

  let title = "";
  let message = "";

  if (type === "morning") {
    title = "Drink Water, Jam 💧";
    message = "💧 Start your day with a sip, not stress";
  }

  if (type === "afternoon") {
    title = "Refill Time, Jam 😅💧";
    message = "Don’t dry text… or dry body 💧";
  }

  if (type === "evening") {
    title = "Good Evening, Jam 😉";
    message = "You survived today… now hydrate 💦";
  }

  if (type === "night") {
    title = "Good Night, Jam 😴";
    message = "Last sip before you dip 💧";
  }

  sendNotification(title, message);
};

// ✍️ CUSTOM NOTIFICATION
window.sendCustomNotification = function () {
  const msg = document.getElementById("message").value;
  sendNotification("💧 Hydration", msg);
};

// ✅ LOGIN
window.login = async function () {
  try {
    const pass = document.getElementById("password").value;
    await signInWithEmailAndPassword(auth, "devansh@jamd.com", pass);
  } catch {
    document.getElementById("error").innerText = "Wrong password ❌";
  }
};

// 🔄 AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("login-box").style.display = "none";
    document.getElementById("panel").style.display = "block";

    loadSettings();
    loadChart();
  }
});

// ✅ LOGOUT
window.logout = function () {
  signOut(auth);
};

// 🚀 FIREBASE UPDATE
window.send = async function () {
  await setDoc(doc(db, "settings", "main"), {
    goal: parseInt(document.getElementById("goal").value),
    surprise: document.getElementById("surprise").value,
    message: document.getElementById("message").value,
    trigger: Date.now()
  });

  alert("Updated 🚀");
};

// 🔄 LOAD SETTINGS
async function loadSettings() {
  const snap = await getDoc(doc(db, "settings", "main"));

  if (snap.exists()) {
    const data = snap.data();
    document.getElementById("goal").value = data.goal || 12;
    document.getElementById("surprise").value = data.surprise || "";
  }
}

// 📊 CHART
async function loadChart() {
  const snapshot = await getDocs(collection(db, "hydration"));

  let map = {};
  snapshot.forEach(d => map[d.data().date] = d.data().glasses);

  let labels = [], values = [];

  for (let i = 6; i >= 0; i--) {
    let d = new Date();
    d.setDate(d.getDate() - i);

    let key = d.toISOString().split("T")[0];

    labels.push(key.slice(5));
    values.push(map[key] || 0);
  }

  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Glasses",
        data: values,
        tension: 0.4
      }]
    }
  });
}
</script>

</body>
</html>
