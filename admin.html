<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: sans-serif; padding:20px; }
input, textarea { width:100%; margin:10px 0; padding:10px; }
button { padding:10px; width:100%; margin-top:10px; }
#admin-panel { display:none; }
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login-box">
  <h2>🔐 Admin Login</h2>

  <input type="password" id="password" placeholder="Enter password">
  <button onclick="login()">Login</button>

  <p id="error" style="color:red;"></p>
</div>

<!-- ⚙️ ADMIN PANEL -->
<div id="admin-panel">

  <h2>⚙️ Admin Panel</h2>

  <label>Her Name</label>
  <input id="name">

  <label>Daily Goal</label>
  <input id="goal" type="number">

  <label>Surprise Message 🎁</label>
  <textarea id="surprise"></textarea>

  <button onclick="save()">Save Settings 💾</button>

  <button onclick="logout()">Logout</button>

  <hr>

  <!-- 📊 DASHBOARD -->
  <h3>📊 Last 7 Days Progress</h3>
  <canvas id="chart" height="200"></canvas>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "water-3a73e.firebaseapp.com",
  projectId: "water-3a73e"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔐 LOGIN
window.login = async function() {
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, "devansh@jamd.com", password);
  } catch (err) {
    document.getElementById("error").innerText = "Wrong password ❌";
  }
};

// 🔄 AUTO LOGIN CHECK
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("login-box").style.display = "none";
    document.getElementById("admin-panel").style.display = "block";

    loadSettings();
    loadChart();
  }
});

// 🔓 LOGOUT
window.logout = function() {
  signOut(auth);
};

// 💾 SAVE SETTINGS
window.save = async function() {
  await setDoc(doc(db, "settings", "main"), {
    name: document.getElementById("name").value,
    goal: parseInt(document.getElementById("goal").value),
    surprise: document.getElementById("surprise").value
  });

  alert("Saved ✅");
};

// 🔄 LOAD SETTINGS
async function loadSettings() {
  const snap = await getDoc(doc(db, "settings", "main"));

  if (snap.exists()) {
    const data = snap.data();

    document.getElementById("name").value = data.name || "";
    document.getElementById("goal").value = data.goal || 12;
    document.getElementById("surprise").value = data.surprise || "";
  }
}

// 📊 LOAD CHART
async function loadChart() {
  const snapshot = await getDocs(collection(db, "hydration"));

  let dataMap = {};

  snapshot.forEach(doc => {
    const d = doc.data();
    dataMap[d.date] = d.glasses;
  });

  let labels = [];
  let values = [];

  for (let i = 6; i >= 0; i--) {
    let d = new Date();
    d.setDate(d.getDate() - i);

    let dateStr = d.toISOString().split("T")[0];

    labels.push(dateStr.slice(5));
    values.push(dataMap[dateStr] || 0);
  }

  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Glasses",
        data: values,
        tension: 0.4
      }]
    }
  });
}
</script>

</body>
</html>
