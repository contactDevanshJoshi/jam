<!doctype html>
<html>
<head>
<title>Admin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: sans-serif; padding:20px; }
input, textarea { width:100%; margin:10px 0; padding:10px; }
button { padding:10px; width:100%; }
</style>
</head>

<body>

<h2>🔐 Admin Login</h2>
<input type="password" id="password">
<button onclick="login()">Login</button>

<div id="panel" style="display:none;">

<h3>Settings</h3>

<label>Goal</label>
<input id="goal" type="number">

<label>Message / Surprise</label>
<textarea id="msg"></textarea>

<button onclick="send()">Send 🚀</button>

<hr>

<canvas id="chart"></canvas>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyAdPWpNEMvjVrrGgn4MNeuq8X-QpyuSon0",
  authDomain: "water-3a73e.firebaseapp.com",
  projectId: "water-3a73e"
});

const db = getFirestore(app);
const auth = getAuth(app);

// LOGIN
window.login = async () => {
  await signInWithEmailAndPassword(auth, "devansh@jamd.com", password.value);
};

// SHOW PANEL
onAuthStateChanged(auth, user => {
  if (user) {
    panel.style.display = "block";
    loadChart();
  }
});

// SEND MESSAGE
window.send = async () => {
  await setDoc(doc(db, "settings", "main"), {
    goal: parseInt(goal.value),
    surprise: msg.value,
    message: msg.value,
    trigger: Date.now()
  });

  alert("Sent 🚀");
};

// CHART
async function loadChart() {
  const snapshot = await getDocs(collection(db, "hydration"));

  let map = {};
  snapshot.forEach(d => map[d.data().date] = d.data().glasses);

  let labels = [], values = [];

  for (let i=6;i>=0;i--) {
    let d = new Date();
    d.setDate(d.getDate()-i);
    let key = d.toISOString().split("T")[0];
    labels.push(key.slice(5));
    values.push(map[key] || 0);
  }

  new Chart(chart, {
    type:"line",
    data:{labels,datasets:[{data:values}]}
  });
}
</script>

</body>
</html>
